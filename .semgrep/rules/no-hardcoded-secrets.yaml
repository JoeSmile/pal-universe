rules:
  - id: no-hardcoded-secrets
    patterns:
      - pattern-regex: (?i)(api[_-]?key|secret|password|token|credential)\s*[:=]\s*["'`][A-Za-z0-9_\-\.]{16,}["'`]
    message: "❌ 检测到可能的硬编码密钥 — 请使用环境变量"
    severity: ERROR
    languages:
      - typescript
      - javascript
      - python
      - yaml
    paths:
      exclude:
        - "*.example.*"
        - "*.md"
