name: Code Quality Gates
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── SDD Task AC 门禁 ──────────────────────────
  sdd-ac-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SDD Task AC completeness
        run: bash scripts/check-ac-gate.sh

  # ─── Semgrep 安全扫描 ─────────────────────────
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep custom rules
        run: |
          semgrep \
            --config=.semgrep/rules/ \
            --error \
            --no-rewrite-rule-ids \
            --verbose \
            --severity=ERROR \
            frontend/src/ backend/

  # ─── Knip 死代码检测 ──────────────────────────
  knip:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Knip
        run: bunx knip --no-gitignore

  # ─── PR 模板检查 ─────────────────────────────
  pr-template-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check PR description has relevant sections
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          errors=0
          if ! echo "$PR_BODY" | grep -q '## 描述'; then
            echo "❌ PR 缺少 '## 描述' 章节"
            errors=1
          fi
          if ! echo "$PR_BODY" | grep -q '## 验收检查'; then
            echo "❌ PR 缺少 '## 验收检查' 章节"
            errors=1
          fi
          if [ "$errors" -ne 0 ]; then
            echo ""
            echo "请使用 PR 模板重新填写描述。"
            exit 1
          fi
          echo "✅ PR 模板格式正确"
