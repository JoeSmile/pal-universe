# ============================================================
# Pal Universe — Nginx 生产配置
# 国内部署：阿里云/腾讯云 Ubuntu 22.04 + Docker
# ============================================================

upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# ─── HTTP → HTTPS 跳转 ────────────────────────────
server {
    listen 80;
    server_name paluniverse.cn www.paluniverse.cn;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name paluniverse.cn www.paluniverse.cn;

    # SSL — 首次部署用 certbot 申请
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── 安全头 ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── 静态资源（图片）────────────────────────
    location /images/ {
        alias /app/public/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        # 如果图片不存在，返回占位图
        try_files $uri /images/placeholder.webp;
    }

    # ─── 后端 API ──────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI Chat 流式响应 — 必须关掉缓冲！
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60s;

        # CORS
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ─── AI Chat 流式端点（别名，方便区分）─────
    location /chat/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;     # ⚠️ SSE 必须关缓冲
        proxy_cache off;
        proxy_read_timeout 120s; # AI 思考可能慢，给足时间
    }

    # ─── 前端 ──────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js 需要 WebSocket 支持（HMR 用，生产可关）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── 日志 ──────────────────────────────────
    access_log /var/log/nginx/paluniverse-access.log;
    error_log  /var/log/nginx/paluniverse-error.log warn;
}
